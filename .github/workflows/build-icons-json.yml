name: Build icons.json

on:
  push:
    branches:
      - main
    paths:
      - "icons/*.svg"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-icons-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Generate icons.json
        run: node scripts/build-icons-json.mjs

      - name: Commit icons.json
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi

          git add icons.json
          git commit -m "update icons.json"
          git push
